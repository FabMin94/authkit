name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run ruff formatter
        run: uv run ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: authkit
          POSTGRES_PASSWORD: authkit_pass
          POSTGRES_DB: authkit_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U authkit -d authkit_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Create test database
        env:
          PGPASSWORD: authkit_pass
        run: |
          psql -h localhost -U authkit -d authkit_db -c "CREATE DATABASE authkit_test_db;" 

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://authkit:authkit_pass@localhost:5432/authkit_db
          TEST_DATABASE_URL: postgresql+asyncpg://authkit:authkit_pass@localhost:5432/authkit_test_db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: uv run pytest -v

  build-and-push:
    name: Build and Push image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/${{ github.event.repository.name | lower }}:latest